# .github/workflows/security.yml
# ShieldGuard Security Pipeline — SAST + DAST Automated Scanning
# Triggers: push to main/develop, PRs to main, weekly schedule
name: "🔒 Security Scan (SAST + DAST)"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: "0 0 * * 0"

permissions:
  contents: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1: SAST — Python Static Analysis (Bandit)
  # ──────────────────────────────────────────────────
  sast-python:
    name: "🐍 Python SAST (Bandit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit SAST scan
        run: |
          bandit -r backend/ app/ \
            -f json -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium \
            -x "**/__pycache__/**,**/tests/**" \
            || true

      - name: Display Bandit results summary
        run: |
          echo "=== BANDIT SAST RESULTS ==="
          bandit -r backend/ app/ \
            --severity-level medium \
            --confidence-level medium \
            -x "**/__pycache__/**,**/tests/**" \
            || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-sast-report
          path: bandit-report.json

  # ──────────────────────────────────────────────────
  # JOB 2: SCA — Snyk Python Dependencies
  # ──────────────────────────────────────────────────
  snyk-backend:
    name: "🛡️ Snyk — Python Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Snyk Python scan
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --file=backend/requirements.txt
            --severity-threshold=medium
        continue-on-error: true

  # ──────────────────────────────────────────────────
  # JOB 3: SCA — Snyk Frontend Dependencies
  # ──────────────────────────────────────────────────
  snyk-frontend:
    name: "🛡️ Snyk — Frontend Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Snyk JavaScript scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --file=frontend/package.json
            --severity-threshold=medium
        continue-on-error: true

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=moderate || true

  # ──────────────────────────────────────────────────
  # JOB 4: SCA — Python Safety CVE Check
  # ──────────────────────────────────────────────────
  safety-check:
    name: "🔍 Python Safety (CVE Check)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Safety
        run: pip install safety

      - name: Run Safety scan
        run: |
          safety check -r backend/requirements.txt || true

  # ──────────────────────────────────────────────────
  # JOB 5: DAST — OWASP ZAP Baseline Scan
  # ──────────────────────────────────────────────────
  dast-zap:
    name: "🌐 DAST — OWASP ZAP Scan"
    runs-on: ubuntu-latest
    needs: [sast-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Start backend server for DAST
        working-directory: backend
        run: |
          # Create minimal .env for CI testing (no real keys needed)
          echo "GROQ_API_KEY=ci_test_dummy" > .env
          echo "SUPABASE_URL=https://dummy.supabase.co" >> .env
          echo "SUPABASE_KEY=dummy_key_for_ci" >> .env
          echo "JWT_SECRET=ci_test_jwt_secret" >> .env
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 &
          # Wait for server to be ready
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            sleep 2
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: false
        continue-on-error: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: report_html.html

  # ──────────────────────────────────────────────────
  # JOB 6: Secret Scanning (Gitleaks)
  # ──────────────────────────────────────────────────
  secret-scan:
    name: "🔑 Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
