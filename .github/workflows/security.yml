# ShieldGuard CI Security Pipeline
#
# Purpose:
# - Prove that the backend and frontend still build.
# - Run security checks that match the actual ShieldGuard architecture.
# - Produce readable reports for project review and FYP explanation.

name: ShieldGuard CI Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: shieldguard-ci-security-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend-quality:
    name: Backend quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Compile backend and legacy Streamlit modules
        run: python -m compileall -q backend app

      - name: Run backend unit tests
        run: python -m pytest tests/test_auth.py -q

      - name: Backend summary
        if: always()
        run: |
          {
            echo "## Backend quality gate"
            echo "- Python version: ${{ env.PYTHON_VERSION }}"
            echo "- Checks: dependency install, compileall, auth unit tests"
            echo "- Purpose: confirms the FastAPI security/authentication foundation is still importable and testable"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-quality:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Frontend summary
        if: always()
        run: |
          {
            echo "## Frontend quality gate"
            echo "- Node.js version: ${{ env.NODE_VERSION }}"
            echo "- Checks: npm ci, ESLint, Vite production build"
            echo "- Purpose: confirms the user-facing ShieldGuard dashboard can still ship"
          } >> "$GITHUB_STEP_SUMMARY"

  python-sast:
    name: Python static security analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]"

      - name: Run Bandit and save JSON report
        run: |
          mkdir -p reports
          bandit -c .bandit.yml -r backend app \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o reports/bandit-report.json

      - name: Print Bandit summary
        if: always()
        run: |
          bandit -c .bandit.yml -r backend app \
            --severity-level medium \
            --confidence-level medium || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: reports/bandit-report.json
          if-no-files-found: warn

      - name: SAST summary
        if: always()
        run: |
          {
            echo "## Python static security analysis"
            echo "- Tool: Bandit"
            echo "- Scope: backend/ and app/"
            echo "- Gate: medium-or-higher severity with medium-or-higher confidence"
          } >> "$GITHUB_STEP_SUMMARY"

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit Python dependencies
        continue-on-error: true
        run: |
          mkdir -p reports
          pip-audit -r backend/requirements.txt \
            --format json \
            --output reports/pip-audit-report.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        continue-on-error: true
        run: npm audit --audit-level=moderate --json > ../reports/npm-audit-report.json

      - name: Run Snyk backend scan
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/python-3.11@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          command: test
          args: --file=backend/requirements.txt --severity-threshold=medium
        continue-on-error: true

      - name: Run Snyk frontend scan
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          command: test
          args: --file=frontend/package.json --severity-threshold=medium
        continue-on-error: true

      - name: Note skipped Snyk scans
        if: env.SNYK_TOKEN == ''
        run: |
          {
            echo "## Snyk scans"
            echo "- Status: skipped"
            echo "- Reason: SNYK_TOKEN repository secret is not configured"
            echo "- Fix: add SNYK_TOKEN in GitHub repository settings to enable Snyk SCA"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: reports/*-audit-report.json
          if-no-files-found: warn

      - name: Dependency audit summary
        if: always()
        run: |
          {
            echo "## Dependency audit"
            echo "- Python: pip-audit against backend/requirements.txt"
            echo "- Frontend: npm audit against frontend/package-lock.json"
            echo "- Snyk: optional extra SCA when SNYK_TOKEN is configured"
          } >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Secret scan summary
        if: always()
        run: |
          {
            echo "## Secret scan"
            echo "- Tool: Gitleaks"
            echo "- Scope: committed repository history available to the workflow"
            echo "- Purpose: catches leaked API keys, JWT secrets, and service tokens before deployment"
          } >> "$GITHUB_STEP_SUMMARY"

  dast-zap:
    name: OWASP ZAP DAST scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-quality]
    if: github.event_name != 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create CI environment file
        working-directory: backend
        run: |
          {
            echo "GROQ_API_KEY=ci_dummy_key"
            echo "SUPABASE_URL=https://example.supabase.co"
            echo "SUPABASE_KEY=ci_dummy_key"
            echo "JWT_SECRET=ci_security_pipeline_secret"
            echo "CORS_ORIGINS=http://localhost:5173,http://localhost:3000"
          } > .env

      - name: Start backend API
        id: api
        working-directory: backend
        run: |
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > ../backend-server.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://localhost:8000/api/health > /dev/null; then
              echo "ready=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 3
          done
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "Backend did not become ready for DAST." >&2
          tail -100 ../backend-server.log >&2 || true
          exit 1

      - name: Run OWASP ZAP baseline scan
        if: steps.api.outputs.ready == 'true'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8000
          rules_file_name: .zap/rules.tsv
          cmd_options: -a -j
          allow_issue_writing: false
        continue-on-error: true

      - name: Upload DAST reports and server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            report_html.html
            report_json.json
            report_md.md
            backend-server.log
          if-no-files-found: warn

      - name: DAST summary
        if: always()
        run: |
          {
            echo "## OWASP ZAP DAST scan"
            echo "- Target: live FastAPI backend at http://localhost:8000"
            echo "- Endpoint checked before scan: /api/health"
            echo "- Pull requests: skipped to keep PR feedback fast"
            echo "- Manual run: use workflow_dispatch when you want a fresh DAST report"
          } >> "$GITHUB_STEP_SUMMARY"
